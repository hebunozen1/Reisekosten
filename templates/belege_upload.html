<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Belege hochladen</title>
  <style>
    body{font-family:Arial;background:#f5f5f5;margin:0;padding:18px}
    .card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,.06);max-width:900px;margin:0 auto 12px}
    .btn{padding:10px 12px;border:1px solid #ddd;background:#fff;border-radius:10px;cursor:pointer;color:#111;text-decoration:none;display:inline-block}
    .primary{background:#0c7be5;border-color:#0c7be5;color:#fff}
    .danger{background:#ff4d4f;border-color:#ff4d4f;color:#fff}
    .muted{color:#666;font-size:13px}
    #log{white-space:pre-wrap;background:#111;color:#eee;padding:12px;border-radius:10px;max-height:320px;overflow:auto;font-size:13px}
    progress{width:100%;height:20px}
  </style>
</head>
<body>
<div class="card">
  <h2>📁 Entpackte Belege hochladen</h2>
  <p class="muted">Nutze diese Seite nur für den entpackten Beleg-Ordner, nicht für die ZIP-Datei.</p>
  <p><a class="btn" href="{{ url_for('dashboard') }}">← Zurück zur Buchhaltung</a></p>
</div>

<div class="card">
  <p><b>Schritt 1:</b> ZIP auf deinem PC entpacken.</p>
  <p><b>Schritt 2:</b> Hier den entpackten Ordner auswählen.</p>
  <input id="folderInput" type="file" webkitdirectory directory multiple>
  <button id="startBtn" class="btn primary" type="button">Upload starten</button>
  <button id="stopBtn" class="btn danger" type="button" disabled>Stop</button>
  <p id="status" class="muted">Noch nicht gestartet.</p>
  <progress id="progress" value="0" max="100"></progress>
</div>

<div class="card">
  <h3>Protokoll</h3>
  <div id="log"></div>
</div>

<script>
(() => {
  const input = document.getElementById('folderInput');
  const startBtn = document.getElementById('startBtn');
  const stopBtn = document.getElementById('stopBtn');
  const statusEl = document.getElementById('status');
  const progress = document.getElementById('progress');
  const logEl = document.getElementById('log');
  let stopped = false;

  const allowed = ['.jpg','.jpeg','.png','.webp','.gif','.pdf','.heic','.heif'];
  const log = (msg) => {
    logEl.textContent += msg + "\n";
    logEl.scrollTop = logEl.scrollHeight;
  };

  function cleanName(file) {
    let path = file.webkitRelativePath || file.name;
    path = path.replace(/\\/g, '/');
    const parts = path.split('/').filter(Boolean);
    const idxUploads = parts.indexOf('uploads');
    const idxBelege = parts.indexOf('belege_backup');
    if (idxUploads >= 0) return parts.slice(idxUploads).join('/');
    if (idxBelege >= 0) return parts.slice(idxBelege).join('/');
    return file.name;
  }

  function isAllowed(file) {
    const n = (file.name || '').toLowerCase();
    return allowed.some(ext => n.endsWith(ext));
  }

  stopBtn.addEventListener('click', () => { stopped = true; log('Upload wird nach der aktuellen Datei gestoppt...'); });

  startBtn.addEventListener('click', async () => {
    stopped = false;
    const files = Array.from(input.files || []).filter(isAllowed);
    if (!files.length) {
      alert('Keine Beleg-Dateien im ausgewählten Ordner gefunden.');
      return;
    }

    startBtn.disabled = true;
    stopBtn.disabled = false;
    progress.max = files.length;
    progress.value = 0;
    logEl.textContent = '';

    let ok = 0;
    let fail = 0;
    let aliases = 0;

    for (let i = 0; i < files.length; i++) {
      if (stopped) break;
      const file = files[i];
      const relName = cleanName(file);
      statusEl.textContent = `Upload läuft: ${i + 1}/${files.length} — ${relName}`;

      const form = new FormData();
      form.append('file', file, file.name);
      form.append('filename', relName);

      try {
        const res = await fetch('/admin/restore-beleg-file', { method: 'POST', body: form, credentials: 'same-origin' });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok) {
          fail++;
          log(`FEHLER: ${relName} — ${data.error || res.status}`);
        } else {
          ok++;
          aliases += Number(data.alias_count || 0);
          log(`OK: ${relName}${data.alias_count ? ' + Alias' : ''}`);
        }
      } catch (err) {
        fail++;
        log(`FEHLER: ${relName} — ${err.message || err}`);
      }
      progress.value = i + 1;
    }

    statusEl.textContent = `Fertig. Erfolgreich: ${ok}, Fehler: ${fail}, zusätzliche Alias-Dateien: ${aliases}`;
    startBtn.disabled = false;
    stopBtn.disabled = true;
  });
})();
</script>
</body>
</html>
